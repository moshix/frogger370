<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 50">
  <!-- Left rounded end -->
  <ellipse cx="16" cy="25" rx="16" ry="21" fill="#6E3710"/>
  <!-- Log body -->
  <rect x="16" y="4" width="118" height="42" fill="#6E3710"/>
  <!-- Wood grain -->
  <rect x="10" y="8" width="118" height="4" rx="2" fill="#9B6030" opacity="0.5"/>
  <rect x="14" y="16" width="110" height="3" rx="1" fill="#4E2508" opacity="0.6"/>
  <rect x="10" y="23" width="117" height="5" rx="2" fill="#9B6030" opacity="0.45"/>
  <rect x="16" y="32" width="104" height="3" rx="1" fill="#4E2508" opacity="0.5"/>
  <rect x="12" y="38" width="114" height="4" rx="2" fill="#9B6030" opacity="0.35"/>
  <!-- Knot 1 -->
  <ellipse cx="50" cy="20" rx="6" ry="5" fill="#4E2508" opacity="0.6"/>
  <ellipse cx="50" cy="20" rx="3.5" ry="3" fill="#5C2E0E" opacity="0.5"/>
  <!-- Knot 2 -->
  <ellipse cx="100" cy="30" rx="5" ry="4" fill="#4E2508" opacity="0.55"/>
  <ellipse cx="100" cy="30" rx="3" ry="2.5" fill="#5C2E0E" opacity="0.4"/>
  <!-- Bark crack -->
  <line x1="75" y1="6" x2="78" y2="18" stroke="#4E2508" stroke-width="1.5" opacity="0.4"/>
  <!-- Cross-section (right end) -->
  <ellipse cx="134" cy="25" rx="16" ry="21" fill="#9B6030"/>
  <ellipse cx="134" cy="25" rx="13" ry="18" fill="#BF8A50"/>
  <ellipse cx="134" cy="25" rx="9" ry="13" fill="#A06B35"/>
  <ellipse cx="134" cy="25" rx="5" ry="8" fill="#CFA870"/>
  <ellipse cx="134" cy="25" rx="2.5" ry="3.5" fill="#6E3E20"/>
</svg>