<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- Water ripple around turtle -->
  <ellipse cx="25" cy="38" rx="24" ry="10" fill="#1A7AC4" opacity="0.5"/>
  <ellipse cx="25" cy="38" rx="20" ry="7" fill="#2196F3" opacity="0.3"/>
  <!-- Turtle body / shell dome -->
  <ellipse cx="25" cy="28" rx="22" ry="18" fill="#2E7D32"/>
  <!-- Shell pattern - central scutes -->
  <ellipse cx="25" cy="24" rx="8" ry="10" fill="#388E3C" stroke="#1B5E20" stroke-width="0.8"/>
  <!-- Shell pattern - left scutes -->
  <path d="M17 18 Q12 24 17 32 Q20 26 17 18Z" fill="#43A047" stroke="#1B5E20" stroke-width="0.6"/>
  <path d="M10 22 Q6 28 12 34 Q14 28 10 22Z" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Shell pattern - right scutes -->
  <path d="M33 18 Q38 24 33 32 Q30 26 33 18Z" fill="#43A047" stroke="#1B5E20" stroke-width="0.6"/>
  <path d="M40 22 Q44 28 38 34 Q36 28 40 22Z" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Shell pattern - top scutes -->
  <path d="M20 13 Q25 10 30 13 Q25 18 20 13Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="0.5"/>
  <!-- Shell highlight / wet sheen -->
  <ellipse cx="20" cy="20" rx="6" ry="4" fill="#81C784" opacity="0.5"/>
  <ellipse cx="32" cy="26" rx="4" ry="3" fill="#A5D6A7" opacity="0.35"/>
  <!-- Shell ridge dots -->
  <circle cx="25" cy="15" r="1.5" fill="#FDD835" opacity="0.7"/>
  <circle cx="19" cy="24" r="1.2" fill="#FFB300" opacity="0.6"/>
  <circle cx="31" cy="24" r="1.2" fill="#FFB300" opacity="0.6"/>
  <circle cx="25" cy="32" r="1.2" fill="#FDD835" opacity="0.5"/>
  <!-- Head poking out front -->
  <ellipse cx="25" cy="8" rx="5" ry="4" fill="#6D8B3A"/>
  <ellipse cx="25" cy="8" rx="4" ry="3" fill="#8DA85C"/>
  <circle cx="23" cy="7" r="0.8" fill="#1A1A1A"/>
  <circle cx="27" cy="7" r="0.8" fill="#1A1A1A"/>
  <!-- Front legs -->
  <ellipse cx="10" cy="32" rx="4" ry="2.5" fill="#6D8B3A" transform="rotate(-20 10 32)"/>
  <ellipse cx="40" cy="32" rx="4" ry="2.5" fill="#6D8B3A" transform="rotate(20 40 32)"/>
</svg>